# yaml-language-server: $schema=https://raw.githubusercontent.com/woodpecker-ci/woodpecker/main/pipeline/frontend/yaml/linter/schema/schema.json

when:
  - event: push
  - event: manual

steps:
  - name: Deploy preview
    image: node:22-alpine
    when:
      - branch:
          exclude: main
    environment:
      VERCEL_ORG_ID: ${VERCEL_ORG_ID}
      VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID}
    commands:
      # Install bun
      - npm install -g bun && bun install

      # Pull variables from Vercel
      - bun run vercel env pull --token=${VERCEL_TOKEN}

      # Build project
      - bun run build

      # Deploy on vercel
      - bun run vercel deploy --prebuilt --token=${VERCEL_TOKEN}

  - name: Deploy prod
    image: node:22-alpine
    when:
      - branch: main
    environment:
      VERCEL_ORG_ID: ${VERCEL_ORG_ID}
      VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID}
    commands:
      # Install bun
      - npm install -g bun && bun install

      # Pull variables from Vercel
      - bun run vercel env pull --token=${VERCEL_TOKEN}

      # Build project
      - bun run build

      # Deploy on vercel
      - bun run vercel deploy --prebuilt --prod --token=${VERCEL_TOKEN}
