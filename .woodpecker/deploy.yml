# yaml-language-server: $schema=https://raw.githubusercontent.com/woodpecker-ci/woodpecker/main/pipeline/frontend/yaml/linter/schema/schema.json

when:
  - event: push
    branch: main

steps:
  - name: Build
    image: node:22-alpine
    commands:
      # Install bun
      - npm install -g bun && bun install

      # Add env variables to .env
      - printf "RESEND_API_KEY=${RESEND_API_KEY}\nRESEND_FROM_ADDRESS=${RESEND_FROM_ADDRESS}\nRESEND_TO_ADDRESS=${RESEND_TO_ADDRESS}" > .env

      # Build project
      - bun run build

      # Deploy on vercel
      - bun run vercel deploy
